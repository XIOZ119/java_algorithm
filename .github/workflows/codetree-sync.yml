name: Sync Codetree Subtree

on:
  schedule:
    - cron: '0 16 * * *'  # 매일 KST 1시 (UTC 기준 16시)
  workflow_dispatch:      # 수동 실행 버튼도 추가

permissions:
  contents: write
  
jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout algorithm repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # subtree 병합을 위해 전체 커밋 기록이 필요함

      - name: Set Git config
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
            
      - name: Debug secret and repo url
        run: |
          echo "Secret length: ${#CODETREE_TOKEN}"
          echo "Repo URL: github.com/XIOZ119/codetree_solutions.git"
        env:
          CODETREE_TOKEN: ${{ secrets.CODETREE_TOKEN }}
      - name: Test codetree token
        run: |
          git ls-remote https://XIOZ119:${{ secrets.CODETREE_TOKEN }}@github.com/XIOZ119/codetree_solutions.git
  
      - name: Debug GitHub API access
        run: |
          curl -i \
            -u XIOZ119:${{ secrets.CODETREE_TOKEN }} \
            https://api.github.com/repos/XIOZ119/codetree_solutions
  
      - name: Debug git ls-remote verbose
        run: |
          GIT_TRACE=1 GIT_CURL_VERBOSE=1 git ls-remote https://XIOZ119:${{ secrets.CODETREE_TOKEN }}@github.com/XIOZ119/codetree_solutions.git

      - name: Add codetree remote
        run: |
          git remote add codetree https://XIOZ119:${{ secrets.CODETREE_TOKEN }}@github.com/XIOZ119/codetree_solutions.git
          git fetch codetree

      - name: Pull codetree subtree
        run: |
          git subtree pull --prefix=codetree codetree main -m "chore(subtree): sync codetree"

      - name: Push updated subtree
        run: |
          git push origin main
